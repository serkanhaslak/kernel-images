name: Publish Railway Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push headful image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/chromium-headful/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kernel-browser:latest
            ghcr.io/${{ github.repository_owner }}/kernel-browser:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push headless image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/chromium-headless/image/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kernel-browser-headless:latest
            ghcr.io/${{ github.repository_owner }}/kernel-browser-headless:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
